<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d22" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1266cc" />
    </marker>
    <style>
      .title{font-family:'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:34px;font-weight:700;fill:#111}
      .sub{font-family:'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:25px;font-weight:700;fill:#111}
      .txt{font-family:'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:21px;fill:#111}
      .small{font-family:'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:18px;fill:#333}
      .formula{font-family:'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:22px;fill:#111;font-weight:600}
      .line{stroke:#111;stroke-width:3;fill:none}
      .thin{stroke:#555;stroke-width:2;fill:none}
      .dash{stroke:#777;stroke-width:2;stroke-dasharray:8 7;fill:none}
      .red{stroke:#d22;stroke-width:4;fill:none;marker-end:url(#arrowRed)}
      .blue{stroke:#1266cc;stroke-width:4;fill:none;marker-end:url(#arrowBlue)}
      .panel{fill:#fbfbfb;stroke:#222;stroke-width:2;rx:18}
      .note{fill:#fff7d6;stroke:#d4a400;stroke-width:2;rx:14}
      .dot{fill:#111}
      .redDot{fill:#d22}
      .blueDot{fill:#1266cc}
    </style>
  </defs>

  <rect width="1400" height="900" fill="white"/>
  <text x="700" y="55" text-anchor="middle" class="title">摄影测量：像片倾斜位移 vs 地形起伏位移</text>

  <!-- panels -->
  <rect x="45" y="90" width="630" height="635" class="panel"/>
  <rect x="725" y="90" width="630" height="635" class="panel"/>

  <!-- LEFT: tilt -->
  <text x="360" y="132" text-anchor="middle" class="sub">① 像片倾斜引起的像点位移</text>
  <text x="360" y="165" text-anchor="middle" class="txt">相机没有垂直向下拍，像平面“歪了”</text>

  <!-- camera center -->
  <circle cx="360" cy="245" r="7" class="dot"/>
  <text x="375" y="238" class="formula">S 摄影中心</text>

  <!-- reference and tilted planes -->
  <line x1="170" y1="490" x2="550" y2="490" class="dash"/>
  <text x="555" y="496" class="small">水平像平面参考</text>
  <line x1="160" y1="545" x2="565" y2="425" class="line"/>
  <text x="170" y="574" class="small">倾斜像平面</text>

  <!-- rays -->
  <line x1="360" y1="245" x2="210" y2="530" class="thin"/>
  <line x1="360" y1="245" x2="470" y2="453" class="thin"/>
  <line x1="360" y1="245" x2="540" y2="433" class="thin"/>

  <!-- isocenter c -->
  <circle cx="355" cy="487" r="8" class="blueDot"/>
  <text x="368" y="514" class="formula" fill="#1266cc">c 等角点</text>

  <!-- radial displacement arrows from c -->
  <circle cx="260" cy="515" r="6" class="dot"/>
  <circle cx="224" cy="526" r="6" class="redDot"/>
  <line x1="260" y1="515" x2="226" y2="525" class="red"/>
  <circle cx="455" cy="457" r="6" class="dot"/>
  <circle cx="493" cy="446" r="6" class="redDot"/>
  <line x1="455" y1="457" x2="490" y2="447" class="red"/>
  <circle cx="395" cy="475" r="6" class="dot"/>
  <circle cx="414" cy="469" r="6" class="redDot"/>
  <line x1="395" y1="475" x2="412" y2="470" class="red"/>

  <rect x="90" y="610" width="530" height="88" class="note"/>
  <text x="112" y="642" class="formula">辐射中心：等角点 c</text>
  <text x="112" y="674" class="txt">记法：相机“倾斜”了 → 找 c</text>

  <!-- RIGHT: relief -->
  <text x="1040" y="132" text-anchor="middle" class="sub">② 地形起伏引起的像点位移</text>
  <text x="1040" y="165" text-anchor="middle" class="txt">地面有高差，高处离相机近，投影位置变了</text>

  <!-- camera center -->
  <circle cx="1040" cy="235" r="7" class="dot"/>
  <text x="1055" y="228" class="formula">S 摄影中心</text>

  <!-- image plane -->
  <line x1="840" y1="365" x2="1240" y2="365" class="line"/>
  <text x="1245" y="371" class="small">像平面</text>
  <circle cx="1040" cy="365" r="8" class="blueDot"/>
  <text x="1053" y="395" class="formula" fill="#1266cc">n 像底点</text>

  <!-- ground terrain -->
  <path d="M820 640 C900 620, 930 590, 970 590 C1000 590, 1018 550, 1048 520 C1085 485, 1115 570, 1160 585 C1210 603, 1250 625, 1290 635" class="line"/>
  <line x1="820" y1="640" x2="1290" y2="640" class="dash"/>
  <text x="1265" y="666" class="small">基准面</text>

  <!-- points A high and A0 base -->
  <circle cx="1048" cy="520" r="7" class="redDot"/>
  <text x="1060" y="514" class="formula">A 山顶</text>
  <circle cx="1048" cy="640" r="6" class="dot"/>
  <text x="1060" y="666" class="formula">A₀ 平地点</text>
  <line x1="1048" y1="520" x2="1048" y2="640" stroke="#d22" stroke-width="3" stroke-dasharray="6 5"/>
  <text x="1016" y="586" class="formula" fill="#d22">h</text>

  <!-- projection rays -->
  <line x1="1040" y1="235" x2="1048" y2="520" class="thin"/>
  <line x1="1040" y1="235" x2="1048" y2="640" class="thin"/>
  <!-- intersections approximate -->
  <circle cx="1044" cy="365" r="6" class="redDot"/>
  <text x="1052" y="350" class="small">a</text>
  <circle cx="1042" cy="365" r="5" class="dot" opacity="0.35"/>
  <!-- More visible schematic displacement on plane radial from n -->
  <circle cx="1132" cy="365" r="6" class="dot"/>
  <circle cx="1190" cy="365" r="6" class="redDot"/>
  <line x1="1132" y1="365" x2="1184" y2="365" class="red"/>
  <text x="1124" y="340" class="small">低点像</text>
  <text x="1174" y="340" class="small">高点像</text>
  <path d="M1040 365 L1190 365" stroke="#1266cc" stroke-width="2" stroke-dasharray="5 5"/>

  <rect x="770" y="610" width="530" height="88" class="note"/>
  <text x="792" y="642" class="formula">辐射中心：像底点 n</text>
  <text x="792" y="674" class="txt">记法：地面“起伏”了 → 找 n</text>

  <!-- bottom comparison -->
  <rect x="170" y="760" width="1060" height="105" fill="#eef6ff" stroke="#1266cc" stroke-width="3" rx="18"/>
  <text x="700" y="806" text-anchor="middle" class="title" fill="#1266cc">考试口诀：倾斜找 c，起伏找 n</text>
  <text x="700" y="845" text-anchor="middle" class="txt">像片倾斜位移看相机姿态；地形起伏位移看地面高差 h。</text>
</svg>
