<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/>
    </marker>
    <style>
      .title{font:700 28px sans-serif;fill:#111}.label{font:18px sans-serif;fill:#222}.small{font:15px sans-serif;fill:#444}.bold{font:700 18px sans-serif}.note{font:14px sans-serif;fill:#666}.line{stroke:#333;stroke-width:2;fill:none}.dash{stroke-dasharray:8 7}.blue{stroke:#1c7ed6;fill:#1c7ed6}.red{stroke:#e03131;fill:#e03131}.purple{stroke:#7048e8;fill:#7048e8}.green{stroke:#2f9e44;fill:#2f9e44}.orange{stroke:#f08c00;fill:#f08c00}
    </style>
  </defs>

  <text x="600" y="48" text-anchor="middle" class="title">航摄像片几何：像主点 o、像底点 n、等角点 c 与像点位移</text>

  <!-- Ground datum -->
  <line x1="80" y1="690" x2="1120" y2="690" stroke="#555" stroke-width="3"/>
  <text x="90" y="725" class="label">地面基准面 / 平均地面</text>

  <!-- Relief hill -->
  <path d="M220 690 C245 650,265 595,305 582 C345 595,365 650,400 690" stroke="#2f9e44" stroke-width="5" fill="none"/>
  <text x="210" y="545" class="bold" fill="#2f9e44">高出基准面的地物</text>
  <text x="210" y="573" class="small" fill="#2f9e44">会造成投影差</text>

  <!-- Camera center -->
  <circle cx="600" cy="120" r="8" fill="#d9480f"/>
  <text x="620" y="115" class="bold" fill="#d9480f">S 摄影中心</text>

  <!-- vertical plumb line -->
  <line x1="600" y1="120" x2="600" y2="690" stroke="#868e96" stroke-width="2" stroke-dasharray="9 7"/>
  <text x="613" y="405" class="small" fill="#666">铅垂线</text>

  <!-- tilted photo plane -->
  <line x1="340" y1="395" x2="860" y2="285" stroke="#1c7ed6" stroke-width="12" stroke-linecap="round"/>
  <text x="805" y="330" class="bold" fill="#1c7ed6">倾斜像片平面</text>

  <!-- principal axis and point o -->
  <line x1="600" y1="120" x2="558" y2="349" stroke="#1864ab" stroke-width="3"/>
  <circle cx="558" cy="349" r="8" fill="#1864ab"/>
  <text x="455" y="388" class="small" fill="#1864ab">o 像主点</text>
  <text x="455" y="410" class="small" fill="#1864ab">主光轴与像片交点</text>

  <!-- nadir point n, intersection of vertical with image plane -->
  <circle cx="600" cy="340" r="8" fill="#e03131"/>
  <text x="622" y="368" class="bold" fill="#e03131">n 像底点</text>
  <text x="622" y="393" class="small" fill="#e03131">地形起伏位移 / 投影差</text>
  <text x="622" y="416" class="small" fill="#e03131">的辐射中心</text>

  <!-- isocenter c between o and n -->
  <circle cx="579" cy="345" r="8" fill="#7048e8"/>
  <text x="395" y="315" class="bold" fill="#7048e8">c 等角点</text>
  <text x="395" y="340" class="small" fill="#7048e8">像片倾斜位移</text>
  <text x="395" y="363" class="small" fill="#7048e8">的辐射中心</text>

  <!-- object points -->
  <circle cx="305" cy="690" r="7" fill="#495057"/>
  <text x="260" y="720" class="small" fill="#495057">基准面点</text>
  <circle cx="305" cy="585" r="7" fill="#2f9e44"/>
  <text x="315" y="580" class="small" fill="#2f9e44">高点</text>

  <!-- projection rays -->
  <line x1="600" y1="120" x2="305" y2="690" stroke="#495057" stroke-width="2" opacity="0.75"/>
  <line x1="600" y1="120" x2="305" y2="585" stroke="#2f9e44" stroke-width="2" opacity="0.8"/>
  <!-- approximate image points on plane -->
  <circle cx="407" cy="381" r="7" fill="#495057"/>
  <circle cx="450" cy="372" r="7" fill="#2f9e44"/>

  <!-- relief displacement arrow and radial from n -->
  <line x1="600" y1="340" x2="450" y2="372" stroke="#e03131" stroke-width="2" stroke-dasharray="5 5"/>
  <line x1="407" y1="381" x2="450" y2="372" stroke="#2f9e44" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="315" y="445" class="small" fill="#2f9e44">投影差：高点像点</text>
  <text x="315" y="468" class="small" fill="#2f9e44">背离像底点 n 方向位移</text>

  <!-- tilt displacement radial arrows from c -->
  <line x1="579" y1="345" x2="700" y2="270" stroke="#7048e8" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <line x1="579" y1="345" x2="770" y2="390" stroke="#7048e8" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <line x1="579" y1="345" x2="460" y2="285" stroke="#7048e8" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <text x="710" y="225" class="small" fill="#7048e8">倾斜位移：</text>
  <text x="710" y="248" class="small" fill="#7048e8">围绕等角点 c 呈辐射状变化</text>

  <!-- Exam box -->
  <rect x="70" y="90" width="390" height="150" rx="16" fill="#fff3bf" stroke="#f08c00" stroke-width="3"/>
  <text x="95" y="130" class="bold" fill="#5c3c00">考试配对</text>
  <text x="95" y="166" class="label">像片倾斜 → 倾斜位移 → 等角点 c</text>
  <text x="95" y="202" class="label">地形起伏 → 投影差 → 像底点 n</text>
  <text x="95" y="232" class="bold" fill="#d9480f">口诀：倾斜找等角，起伏找像底</text>

  <!-- footnote -->
  <text x="600" y="770" text-anchor="middle" class="note">注：本图用于建立概念关系；严格位置需由航摄内、外方位元素计算。倾斜像片中 o、n、c 一般不完全重合。</text>
</svg>
